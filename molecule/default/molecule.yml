dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: sudo-debian12
    image: docker.io/geerlingguy/docker-debian12-ansible:latest
    command: /lib/systemd/systemd
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
  - name: sudo-ubuntu2404
    image: docker.io/geerlingguy/docker-ubuntu2404-ansible:latest
    command: /lib/systemd/systemd
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
verifier:
  name: ansible
