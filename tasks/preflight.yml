- name: Load OS family specific sudo variables
  tags:
    - sudo
    - sudo_vars
    - sudo_preflight

  block:
    - name: Load sudo OS family variables
      ansible.builtin.include_vars:
        file: "{{ ansible_facts['os_family'] }}.yml"
      tags:
        - sudo
        - sudo_vars
        - sudo_preflight
- name: Validate sudo platform support
  tags:
    - sudo
    - sudo_validate
    - sudo_preflight

  block:
    - name: Assert sudo supports OS family
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] in _sudo__supported_os_families
        fail_msg: >-
          sudo supports these OS families: {{ _sudo__supported_os_families | join(', ') }}.
          Current OS family: {{ ansible_facts['os_family'] }}.
      tags:
        - sudo
        - sudo_validate
        - sudo_preflight

    - name: Assert sudo supports distribution version
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] in _sudo__supported_distributions
          - ansible_facts['distribution_major_version'] in _sudo__supported_distributions[ansible_facts['distribution']]
        fail_msg: >-
          sudo supports {{ _sudo__supported_distributions }}.
          Current platform: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}.
      tags:
        - sudo
        - sudo_validate
        - sudo_preflight
- name: Validate sudo role variables
  tags:
    - sudo
    - sudo_validate
    - sudo_preflight
  block:
    - name: Validate sudo boolean role variables
      ansible.builtin.assert:
        that:
          - sudo__manage_package is boolean
          - sudo__manage_config is boolean
          - sudo__validate_config is boolean
          - sudo__manage_ansible_user is boolean
          - sudo__enable_logging is boolean
        fail_msg: "sudo boolean control variables must be native YAML booleans."
      tags:
        - sudo
        - sudo_validate
        - sudo_preflight

    - name: Validate sudo role-controlled state variables
      ansible.builtin.assert:
        that:
          - sudo__package_state in ['present', 'latest', 'absent']
        fail_msg: >-
          sudo__package_state must be one of present, latest, absent.
          This variable controls role branching before module-level validation.
      tags:
        - sudo
        - sudo_validate
        - sudo_preflight

    - name: Validate sudo scalar role variables
      ansible.builtin.assert:
        that:
          - sudo__ansible_user_rule_name is string
          - sudo__ansible_user_rule_name | length > 0
          - sudo__logfile_path is string
          - sudo__logfile_path is match('^/')
          - sudo__timestamp_timeout is number
        fail_msg: >-
          sudo__ansible_user_rule_name must be non-empty, sudo__logfile_path must be absolute,
          and sudo__timestamp_timeout must be numeric.
      tags:
        - sudo
        - sudo_validate
        - sudo_preflight

    - name: Validate sudo structured role variables
      ansible.builtin.assert:
        that:
          - sudo__sudoer_config is sequence
          - sudo__sudoer_config is not string
        fail_msg: "sudo__sudoer_config must be a list."
      tags:
        - sudo
        - sudo_validate
        - sudo_preflight

    - name: Validate sudoers entries
      ansible.builtin.assert:
        that:
          - item is mapping
          - item['name'] is defined
          - item['name'] is string
          - item['name'] | length > 0
          - item['state'] | default('present') in ['present', 'absent']
          - item['state'] | default('present') == 'absent' or item['user'] is defined or item['group'] is defined
          - item['user'] is not defined or item['user'] is string
          - item['group'] is not defined or item['group'] is string
          - item['runas'] is not defined or item['runas'] is string
          - item['host'] is not defined or item['host'] is string
          - item['commands'] is not defined or item['commands'] is string or item['commands'] is sequence
          - item['noexec'] is not defined or item['noexec'] is boolean
          - item['nopassword'] is not defined or item['nopassword'] is boolean
          - item['setenv'] is not defined or item['setenv'] is boolean
        fail_msg: >-
          Each sudo__sudoer_config entry must define a name and a valid sudoers rule.
          Present entries must define user or group.
      loop: "{{ sudo__sudoer_config }}"
      loop_control:
        label: "{{ item['name'] | default('missing name') }}"
      tags:
        - sudo
        - sudo_validate
        - sudo_preflight
