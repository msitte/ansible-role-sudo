_sudo__supported_distributions:
  Debian:
    - "12"
    - "13"
  Ubuntu:
    - "24"
    - "26"

# ComplianceAsCode:
# - xccdf_org.ssgproject.content_rule_package_sudo_installed
_sudo__packages:
  - sudo

# ComplianceAsCode:
# - xccdf_org.ssgproject.content_rule_sudo_add_use_pty
# - xccdf_org.ssgproject.content_rule_sudo_custom_logfile
# - xccdf_org.ssgproject.content_rule_sudo_remove_no_authenticate
# - xccdf_org.ssgproject.content_rule_sudo_require_reauthentication
_sudo__sudoers_file: /etc/sudoers
_sudo__sudoers_config_dir: /etc/sudoers.d
_sudo__visudo_binary: /usr/sbin/visudo
_sudo__visudo_validate: "{{ _sudo__visudo_binary }} -cf %s"
