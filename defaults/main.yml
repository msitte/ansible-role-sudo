# ComplianceAsCode:
# - xccdf_org.ssgproject.content_rule_package_sudo_installed
sudo__manage_package: true
sudo__manage_config: true
sudo__package_state: present
sudo__validate_config: true

sudo__manage_ansible_user: true
sudo__ansible_user_rule_name: allow-ansible-unrestricted

# ComplianceAsCode:
# - xccdf_org.ssgproject.content_rule_sudo_custom_logfile
sudo__enable_logging: true

# ComplianceAsCode:
# - xccdf_org.ssgproject.content_rule_sudo_custom_logfile
sudo__logfile_path: /var/log/sudo.log

sudo__sudoer_config: []
# ComplianceAsCode:
# - xccdf_org.ssgproject.content_rule_sudo_require_reauthentication
sudo__timestamp_timeout: 15
